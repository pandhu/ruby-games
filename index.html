<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#87CEEB">
  <title>Ruby's Counting Patch 🌸</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">

    <!-- Start Screen -->
    <div id="start-screen">
      <div class="start-icon">🌸</div>
      <h1>Ruby's<br>Counting Patch</h1>
      <p class="subtitle">Water the flowers!</p>
      <button id="start-btn" class="big-btn">Let's Play! 🌱</button>
      <div class="deco-flowers">🌺 🌼 🌻 🌹</div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden">
      <header id="game-header">
        <div id="ruby-area">
          <div id="ruby-char">🧒</div>
          <div id="speech-bubble" class="hidden"></div>
        </div>
        <div id="level-indicator">Level <span id="level-num">1</span> of 4</div>
      </header>

      <main id="game-main">
        <div id="flower-area"></div>
      </main>

      <footer id="game-footer">
        <div id="progress-dots"></div>
      </footer>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="hidden">
      <div class="end-burst">🌸✨🌺✨🌼</div>
      <h2>Amazing job! 🎉</h2>
      <p>You watered all of Ruby's flowers!</p>
      <div class="end-ruby">🧒🌟</div>
      <button id="play-again-btn" class="big-btn">Play Again! 🌱</button>
    </div>

    <!-- Celebration overlay -->
    <div id="celebration"></div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
