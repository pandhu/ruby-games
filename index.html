<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#87CEEB">
  <title>Kebun Hitung Ruby 🌸</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">

    <!-- Start Screen -->
    <div id="start-screen">
      <div class="start-icon">🌸</div>
      <h1>Kebun Hitung<br>Ruby</h1>
      <p class="subtitle">Siram bunga-bunganya!</p>
      <button id="start-btn" class="big-btn">Ayo Main! 🌱</button>
      <div class="deco-flowers">🌺 🌼 🌻 🌹</div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden">
      <header id="game-header">
        <div id="ruby-area">
          <div id="ruby-char">🧒</div>
          <div id="speech-bubble" class="hidden"></div>
        </div>
        <div id="level-indicator">Level <span id="level-num">1</span> dari 4</div>
      </header>

      <main id="game-main">
        <div id="flower-area"></div>
      </main>

      <footer id="game-footer">
        <div id="progress-dots"></div>
      </footer>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="hidden">
      <div class="end-burst">🌸✨🌺✨🌼</div>
      <h2>Hebat sekali! 🎉</h2>
      <p>Kamu sudah menyiram semua bunga Ruby!</p>
      <div class="end-ruby">🧒🌟</div>
      <button id="play-again-btn" class="big-btn">Main Lagi! 🌱</button>
    </div>

    <!-- Celebration overlay -->
    <div id="celebration"></div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
